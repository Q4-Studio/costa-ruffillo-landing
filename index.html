<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleziona Landing - Centri Commerciali Bologna</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #111111;
            --red: #d71920;
            --accent-red: #ef233c;
            --white: #ffffff;
            --light: #f7f7f7;
            --text-medium: #555555;
            --border: #e8e8e8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            align-items: center;
            background:
                radial-gradient(circle at 0% 0%, rgba(215, 25, 32, 0.08), transparent 45%),
                radial-gradient(circle at 100% 100%, rgba(17, 17, 17, 0.08), transparent 45%),
                var(--light);
            color: var(--black);
            display: flex;
            font-family: 'Lato', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.5;
            min-height: 100vh;
            padding: 32px 24px;
        }

        :focus-visible {
            outline: 2px solid var(--red);
            outline-offset: 4px;
            border-radius: 6px;
        }

        main {
            margin: 0 auto;
            max-width: 980px;
            width: 100%;
        }

        .eyebrow {
            color: var(--red);
            font-size: 0.78rem;
            font-weight: 900;
            letter-spacing: 0.22em;
            margin-bottom: 14px;
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(36px, 6vw, 60px);
            font-weight: 900;
            letter-spacing: -0.02em;
            line-height: 1;
            margin-bottom: 14px;
            text-transform: uppercase;
        }

        .intro {
            color: var(--text-medium);
            font-size: 18px;
            margin-bottom: 40px;
            max-width: 56ch;
        }

        .selector {
            display: grid;
            gap: 24px;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        }

        .card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 22px;
            box-shadow: 0 18px 44px rgba(17, 17, 17, 0.08);
            color: var(--black);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            text-decoration: none;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        }

        .card:hover {
            border-color: rgba(215, 25, 32, 0.4);
            box-shadow: 0 28px 60px rgba(17, 17, 17, 0.14);
            transform: translateY(-6px);
        }

        .card-image {
            aspect-ratio: 16 / 9;
            background: var(--black);
            overflow: hidden;
            position: relative;
        }

        .card-image img {
            display: block;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            width: 100%;
        }

        .card:hover .card-image img {
            transform: scale(1.04);
        }

        .card-image::after {
            background: linear-gradient(180deg, rgba(0, 0, 0, 0) 50%, rgba(0, 0, 0, 0.35) 100%);
            content: '';
            inset: 0;
            position: absolute;
        }

        .card-body {
            align-items: center;
            display: flex;
            gap: 12px;
            justify-content: space-between;
            padding: 22px 26px 24px;
        }

        .card-title {
            display: block;
        }

        .card-title span {
            color: var(--red);
            display: block;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.14em;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .card-title strong {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.01em;
        }

        .card-cta {
            align-items: center;
            background: var(--red);
            border-radius: 999px;
            color: var(--white);
            display: inline-flex;
            font-size: 14px;
            font-weight: 900;
            height: 40px;
            justify-content: center;
            transition: background 0.2s ease, transform 0.2s ease;
            width: 40px;
        }

        .card:hover .card-cta {
            background: var(--accent-red);
            transform: translateX(2px);
        }

        footer {
            color: var(--text-medium);
            font-size: 13px;
            margin-top: 36px;
            text-align: center;
        }

        footer a {
            color: var(--black);
            font-weight: 700;
            text-decoration: none;
        }

        footer a:hover { color: var(--red); }
    </style>
</head>

<body>
    <main>
        <p class="eyebrow">Anteprima landing</p>
        <h1>Scegli il centro</h1>
        <p class="intro">Apri una delle due landing page disponibili in questo ambiente di anteprima.</p>
        <div class="selector">
            <a class="card" href="landing-costa/" aria-label="Apri landing Centro Andrea Costa">
                <div class="card-image">
                    <img src="landing-costa/assets/costa-banner.jpg" alt="" loading="lazy">
                </div>
                <div class="card-body">
                    <span class="card-title">
                        <span>Landing</span>
                        <strong>Centro Andrea Costa</strong>
                    </span>
                    <span class="card-cta" aria-hidden="true">&rarr;</span>
                </div>
            </a>
            <a class="card" href="landing-ruffillo/" aria-label="Apri landing Centro San Ruffillo">
                <div class="card-image">
                    <img src="landing-ruffillo/assets/ruffillo-banner.jpg" alt="" loading="lazy">
                </div>
                <div class="card-body">
                    <span class="card-title">
                        <span>Landing</span>
                        <strong>Centro San Ruffillo</strong>
                    </span>
                    <span class="card-cta" aria-hidden="true">&rarr;</span>
                </div>
            </a>
        </div>
        <footer>
            Realizzato da <a href="https://www.headshotagency.it/" target="_blank" rel="noopener noreferrer">Headshot</a>
        </footer>
    </main>
</body>

</html>
